        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; 
            color: #d4d4d8; 
            overflow-x: hidden;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 30s linear infinite;
            display: flex;
            width: max-content;
        }

        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .container-custom {
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        @media (min-width: 768px) {
            .container-custom {
                padding-left: 4rem;
                padding-right: 4rem;
            }
        }

        .switch-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .switch-btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .switch-btn.active {
            background: #4ade80; 
            color: #09090b; 
        }

        .lang-btn {
            font-size: 10px;
            font-weight: 900;
            opacity: 0.4;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .lang-btn.active {
            opacity: 1;
            color: #4ade80;
        }
    </style>

                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 uppercase text-[10px] font-black tracking-widest">
                                    {t.libChecks.map((c, i) => (
                                        <div key={i} className="flex items-center gap-3 bg-white/5 p-4 rounded-xl border border-white/5 hover:border-green-400/30 transition-colors">
                                            <div className="bg-green-400/20 p-1.5 rounded-full shrink-0"><Icon name="check" size={12} className="text-green-400" /></div>
                                            <span className="text-zinc-300">{c}</span>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="md:col-span-6 order-2 md:order-2 relative flex justify-center">
                                <div className="relative w-full max-w-sm">
                                    <div className="absolute inset-0 bg-green-400/10 blur-3xl rounded-3xl"></div>
                                    {/* Borda simulando a tela de um celular */}
                                    <div className="relative z-10 rounded-[2.5rem] border-[8px] border-zinc-800 bg-zinc-950 overflow-hidden shadow-2xl transform hover:-translate-y-2 transition-transform duration-700">
                                        <img src="https://i.imgur.com/dW8VP9H.png" alt="Acervo de Vídeos WhatsApp" className="w-full h-auto object-cover opacity-90 hover:opacity-100 transition-opacity duration-500" />
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* SEÇÃO DE DEPOIMENTOS (Grid de Quadrados) */}
                    <section className="py-24 bg-zinc-950 border-t border-white/5 overflow-hidden">
                        <div className="container-custom">
                            <div className="text-center md:text-left mb-16">
                                <h2 className="text-3xl md:text-5xl font-black text-white uppercase italic tracking-tighter mb-4">
                                    {t.testTitle} <span className="text-green-400">{t.testSpan}</span>
                                </h2>
                                <p className="text-xs md:text-sm text-zinc-400 font-bold uppercase tracking-widest">{t.testSub}</p>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {t.testimonials.map((item, idx) => (
                                    <div key={idx} className="bg-white/5 border border-white/10 p-6 md:p-8 rounded-[2rem] flex flex-col justify-between hover:bg-white/10 transition-colors">
                                        <div>
                                            <span className="text-5xl text-green-400 font-serif leading-none block mb-4">"</span>
                                            <p className="text-zinc-300 text-sm md:text-base font-medium leading-relaxed italic mb-8">
                                                {item.text}
                                            </p>
                                        </div>
                                        <div className="flex items-center gap-4 border-t border-white/10 pt-6 mt-auto">
                                            <div className="w-12 h-12 rounded-full bg-zinc-800 flex items-center justify-center font-black text-lg text-white uppercase border-2 border-green-400/30 shrink-0">
                                                {item.name.charAt(0)}
                                            </div>
                                            <div>
                                                <h4 className="text-white font-black uppercase text-sm tracking-tight">{item.name}</h4>
                                                <span className="text-green-400 text-[10px] font-bold uppercase tracking-widest">{item.role}</span>
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* CALL TO ACTION - SESSÃO ESTRATÉGICA (OFERTA IRRECUSÁVEL) */}
                    <section className="py-24 bg-zinc-950 relative border-t border-white/5 overflow-hidden z-20">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] bg-green-400/5 rounded-full blur-[150px] -z-10 pointer-events-none"></div>
                        <div className="container-custom max-w-4xl text-center relative z-10">
                            <div className="bg-zinc-900/80 backdrop-blur-xl border border-green-400/30 p-10 md:p-16 rounded-[3rem] shadow-[0_0_80px_rgba(74,222,128,0.05)] flex flex-col items-center transform hover:scale-[1.02] transition-transform duration-500">
                                <div className="bg-green-400/20 p-5 rounded-full mb-8 shadow-[0_0_30px_rgba(74,222,128,0.2)]">
                                    <Icon name="message-circle" size={40} className="text-green-400" />
                                </div>
                                <h2 className="text-4xl md:text-6xl font-black text-white leading-none uppercase italic mb-6">
                                    {t.ctaTitle} <br/><span className="text-green-400">{t.ctaSpan}</span>
                                </h2>
                                <p className="text-xl md:text-2xl text-white font-bold mb-6">{t.ctaSub}</p>
                                <p className="text-sm md:text-base text-zinc-400 leading-relaxed mb-10 max-w-2xl font-medium">
                                    {t.ctaText}
                                </p>
                                <button onClick={() => handleWhatsApp(t.ctaBtn)} className="w-full sm:w-auto bg-green-400 hover:bg-white text-zinc-950 px-12 py-5 rounded-2xl font-black text-lg md:text-xl uppercase transition-all shadow-[0_0_40px_rgba(74,222,128,0.4)] hover:shadow-[0_0_60px_rgba(255,255,255,0.4)] flex items-center justify-center gap-3 italic">
                                    {t.ctaBtn} <Icon name="arrow-right" size={24} />
                                </button>
                            </div>
                        </div>
                    </section>

                    {/* FAQ */}
                    <section className="py-24 bg-zinc-900 border-t border-white/5">
                        <div className="max-w-3xl mx-auto px-8">
                            <h2 className="text-3xl md:text-5xl font-black text-white uppercase italic text-center mb-16 tracking-tighter">{t.faqT}</h2>
                            <div className="bg-white/5 p-6 md:p-10 rounded-[2.5rem] border border-white/5">
                                {t.faqs.map((f, i) => <FAQItem key={i} question={f.q} answer={f.a} />)}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 border-t border-white/5 text-center bg-zinc-950">
                        <div className="container-custom">
                            <div className="flex justify-center items-center gap-4 mb-8">
                                <Icon name="activity" className="text-green-400" />
                                <div className="text-2xl font-black text-white italic uppercase tracking-tighter">GARIBALDI</div>
                                <div className="h-6 w-px bg-white/10"></div>
                                <div className="text-[10px] font-black uppercase text-zinc-500">CREF 035143</div>
                            </div>
                            <div className="flex justify-center gap-8 mb-10 font-black uppercase text-[10px] text-zinc-400">
                                <button onClick={() => handleWhatsApp()} className="hover:text-green-400 transition-colors">WhatsApp</button>
                                <span className="opacity-10">•</span>
                                <a href="mailto:contato@nicolasgaribaldi.com" className="hover:text-green-400 transition-colors">Email</a>
                            </div>
                            <p className="text-zinc-600 text-[9px] font-black uppercase tracking-[0.4em] italic">{t.footer} • © 2024</p>
                        </div>
                    </footer>

                    {/* Mobile CTA */}
                    <div className="fixed bottom-6 left-0 w-full px-6 z-50 md:hidden">
                        <button onClick={() => handleWhatsApp()} className="w-full bg-green-400 text-zinc-950 py-4 rounded-2xl font-black text-base shadow-2xl flex items-center justify-center gap-3 uppercase italic">
                             <Icon name="message-circle" size={20} /> {t.mobileCTA}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
