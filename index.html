    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b; /* zinc-950 - Grafite ultra escuro premium */
            color: #d4d4d8; /* zinc-300 */
            overflow-x: hidden;
        }

        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }
        .animate-marquee {
            animation: marquee 30s linear infinite;
            display: flex;
            width: max-content;
        }

        .container-custom {
            width: 100%;
            max-width: 1200px;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1.5rem;
            padding-right: 1.5rem;
        }
        @media (min-width: 768px) {
            .container-custom {
                padding-left: 4rem;
                padding-right: 4rem;
            }
        }

        .switch-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 4px;
            border-radius: 999px;
            display: inline-flex;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .switch-btn {
            padding: 8px 18px;
            border-radius: 999px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: all 0.3s ease;
        }

        .switch-btn.active {
            background: #4ade80; /* green-400 */
            color: #09090b; /* zinc-950 */
        }

        .lang-btn {
            font-size: 10px;
            font-weight: 900;
            opacity: 0.4;
            transition: opacity 0.3s;
            cursor: pointer;
        }
        .lang-btn.active {
            opacity: 1;
            color: #4ade80;
        }
    </style>
</head>

                                <p className="text-xl text-white font-bold mb-4">{t.evalSub}</p>
                                <p className="text-sm text-zinc-400 leading-relaxed mb-8">{t.evalText}</p>
                                
                                <ul className="space-y-4 uppercase text-[10px] font-black tracking-widest mb-10">
                                    {t.evalChecks.map((c, i) => (
                                        <li key={i} className="flex items-center gap-3">
                                            <div className="bg-green-400/20 p-1.5 rounded-full"><Icon name="check" size={12} className="text-green-400" /></div>
                                            <span className="text-zinc-300">{c}</span>
                                        </li>
                                    ))}
                                </ul>

                                <div className="p-6 bg-white/5 border border-white/10 rounded-2xl flex flex-col sm:flex-row items-center justify-between gap-6">
                                    <div className="text-center sm:text-left">
                                        <span className="text-[10px] font-black text-zinc-400 uppercase tracking-widest block mb-1">{t.evalInvest}</span>
                                        <span className="text-3xl font-black text-green-400">{t.evalPrice}</span>
                                    </div>
                                    <button onClick={() => handleWhatsApp(t.evalBtn)} className="w-full sm:w-auto bg-green-400 hover:bg-white text-zinc-950 px-8 py-3 rounded-xl font-black text-[10px] uppercase transition-all shadow-lg shadow-green-400/20">
                                        {t.evalBtn}
                                    </button>
                                </div>
                            </div>
                            <div className="md:col-span-6 order-1 md:order-2 relative">
                                <div className="rounded-[2rem] border border-white/10 overflow-hidden shadow-[0_0_50px_rgba(74,222,128,0.1)] bg-zinc-900">
                                    <img src="https://i.imgur.com/DsGWWIF.png" alt="Relatório de Performance" className="w-full h-auto object-cover opacity-90 hover:opacity-100 transition-opacity duration-500" />
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Planos Principais */}
                    <section id="planos" className="py-24 bg-zinc-50 text-zinc-900 rounded-t-[3rem] md:rounded-t-[5rem] shadow-2xl relative z-30">
                        <div className="container-custom">
                            <div className="flex flex-col items-center mb-16 gap-8">
                                <h2 className="text-4xl md:text-8xl font-black uppercase italic leading-none text-center">{t.planT1} <br/><span className="text-green-600">{t.planT2}</span></h2>
                            </div>

                            {isDigital ? (
                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 max-w-5xl mx-auto">
                                    <div className="p-10 rounded-[2.5rem] bg-zinc-900 text-white flex flex-col relative shadow-2xl z-10 border border-zinc-800">
                                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-green-400 text-zinc-950 px-6 py-1 rounded-full text-[10px] font-black uppercase tracking-widest">{t.vagas}</div>
                                        <h3 className="text-3xl font-black uppercase mb-4 italic leading-none">{t.cardMain}</h3>
                                        <div className="text-5xl font-black mb-10 text-green-400 leading-none tracking-tighter">{t.priceMain}<span className="text-sm font-bold text-zinc-400">{t.priceMainSub}</span></div>
                                        <ul className="space-y-4 mb-10 text-[10px] font-black uppercase">
                                            {t.featuresMain.map((f, i) => <li key={i} className="flex items-center gap-2"><Icon name="check" size={14} className="text-green-400" /> {f}</li>)}
                                        </ul>
                                        <button onClick={() => handleWhatsApp(t.cardMain)} className="mt-auto w-full bg-green-400 text-zinc-950 py-5 rounded-2xl font-black text-lg uppercase italic hover:bg-white transition-all">{t.btnMain}</button>
                                    </div>

                                    <div className="p-10 rounded-[2.5rem] bg-white border border-zinc-200 shadow-sm flex flex-col hover:border-green-400/50 transition-colors">
                                        <h3 className="text-2xl font-black uppercase mb-8">{t.cardExtra}</h3>
                                        <div className="space-y-4 mb-6 font-black uppercase text-[10px]">
                                            <div className="flex justify-between items-center p-5 bg-zinc-50 rounded-2xl shadow-sm border border-zinc-100">
                                                <span>{t.extra1}</span>
                                                <span className="text-green-600 text-lg">{t.extra1Price}</span>
                                            </div>
                                        </div>
                                        <p className="text-[10px] text-zinc-500 uppercase font-black italic mb-6">{t.extraDesc}</p>
                                        
                                        {/* Teaser Imagem Periodização */}
                                        <div className="mt-auto rounded-2xl overflow-hidden border border-zinc-200 shadow-sm relative group">
                                            <div className="absolute inset-0 bg-green-400/10 opacity-0 group-hover:opacity-100 transition-opacity z-10 pointer-events-none"></div>
                                            <img src="https://i.imgur.com/laTCb7e.png" alt="Teaser Periodização" className="w-full h-auto object-cover opacity-90 group-hover:opacity-100 transition-all duration-500 group-hover:scale-105" />
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="text-zinc-900">
                                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-12 mb-16">
                                        <div className="bg-white p-10 rounded-[2.5rem] border border-zinc-200 shadow-sm">
                                            <h3 className="text-2xl font-black uppercase italic mb-6 leading-none">{t.handmadeTitle}</h3>
                                            <p className="text-zinc-600 font-medium mb-8 text-sm leading-relaxed">{t.handmadeSub}</p>
                                            <h4 className="text-xs font-black uppercase mb-4 text-zinc-400">{t.inclusoT}</h4>
                                            <ul className="space-y-4">
                                                {t.inclusoItems.map((it, i) => (
                                                    <li key={i} className="flex gap-4 items-start">
                                                        <Icon name="check" size={18} className="text-green-600 shrink-0" />
                                                        <div>
                                                            <div className="text-[11px] font-black uppercase">{it}</div>
                                                            {i === 2 && <div className="text-[9px] text-zinc-500 font-black uppercase">{t.inclusoItem3Desc}</div>}
                                                        </div>
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                        <div className="space-y-6">
                                            <div className="bg-zinc-900 text-white p-10 rounded-[2.5rem] shadow-2xl border border-zinc-800">
                                                <h3 className="text-2xl font-black uppercase italic mb-6 text-green-400">{t.avaliaCardT}</h3>
                                                <div className="space-y-4 font-black uppercase text-[10px]">
                                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>{t.avaliaItem1}</span><span>{t.avaliaCardP1}</span></div>
                                                    <div className="flex justify-between border-b border-white/10 pb-2"><span>{t.avaliaItem2}</span><span>{t.avaliaCardP2}</span></div>
                                                    <div className="p-4 bg-green-400/10 border border-green-400/30 rounded-xl mt-4 text-green-400 italic">{t.avaliaOffer}</div>
                                                </div>
                                            </div>
                                            <div className="bg-white p-8 rounded-[2rem] flex gap-4 items-center border border-zinc-200 shadow-sm">
                                                <Icon name="map-pin" className="text-zinc-950" size={32} />
                                                <div className="text-[10px] font-black uppercase text-zinc-500">
                                                    <span className="block text-zinc-950 mb-1">{t.location}</span>{t.travelD}
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <h3 className="text-center text-3xl font-black uppercase italic mb-10">{t.pricesT}</h3>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                                        {t.pricesNames.map((name, i) => (
                                            <div key={i} className={`p-8 rounded-3xl flex flex-col shadow-sm ${i === 2 ? 'bg-zinc-50 border-2 border-green-500' : 'bg-white border border-zinc-200'} ${i === 3 ? 'bg-zinc-900 text-white border-zinc-800' : ''}`}>
                                                <h4 className="text-[10px] font-black uppercase text-zinc-400 mb-2">{name}</h4>
                                                <div className={`text-3xl font-black mb-2 ${i === 3 ? 'text-green-400' : ''}`}>{t.pricesVals[i]}</div>
                                                {i > 0 && <div className="text-[9px] font-bold text-zinc-500 uppercase mb-6">{t.pricesSub[i]}</div>}
                                                <button onClick={() => handleWhatsApp(name)} className={`mt-auto w-full py-3 rounded-xl font-black uppercase text-[10px] border-2 transition-all ${i === 3 ? 'bg-green-400 border-green-400 text-zinc-950' : 'border-zinc-900 hover:bg-zinc-900 hover:text-white'}`}>{t.pricesBtn[i]}</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </section>

                    {/* FAQ */}
                    <section className="py-24 bg-zinc-900">
                        <div className="max-w-3xl mx-auto px-8">
                            <h2 className="text-3xl md:text-5xl font-black text-white uppercase italic text-center mb-16 tracking-tighter">{t.faqT}</h2>
                            <div className="bg-white/5 p-6 md:p-10 rounded-[2.5rem] border border-white/5">
                                {t.faqs.map((f, i) => <FAQItem key={i} question={f.q} answer={f.a} />)}
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-20 border-t border-white/5 text-center bg-zinc-950">
                        <div className="container-custom">
                            <div className="flex justify-center items-center gap-4 mb-8">
                                <Icon name="activity" className="text-green-400" />
                                <div className="text-2xl font-black text-white italic uppercase tracking-tighter">GARIBALDI</div>
                                <div className="h-6 w-px bg-white/10"></div>
                                <div className="text-[10px] font-black uppercase text-zinc-500">CREF 035143</div>
                            </div>
                            <div className="flex justify-center gap-8 mb-10 font-black uppercase text-[10px] text-zinc-400">
                                <button onClick={() => handleWhatsApp()} className="hover:text-green-400 transition-colors">WhatsApp</button>
                                <span className="opacity-10">•</span>
                                <a href="mailto:contato@nicolasgaribaldi.com" className="hover:text-green-400 transition-colors">Email</a>
                            </div>
                            <p className="text-zinc-600 text-[9px] font-black uppercase tracking-[0.4em] italic">{t.footer} • © 2024</p>
                        </div>
                    </footer>

                    {/* Mobile CTA */}
                    <div className="fixed bottom-6 left-0 w-full px-6 z-50 md:hidden">
                        <button onClick={() => handleWhatsApp()} className="w-full bg-green-400 text-zinc-950 py-4 rounded-2xl font-black text-base shadow-2xl flex items-center justify-center gap-3 uppercase italic">
                             <Icon name="message-circle" size={20} /> {t.mobileCTA}
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
